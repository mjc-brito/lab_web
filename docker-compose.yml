services:

  # -------------------------------------------------------------------------
  # Redis — channel layer para Django Channels
  # -------------------------------------------------------------------------
  redis:
    image: redis:6-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Django + Daphne
  # -------------------------------------------------------------------------
  django:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    # Para activar o hardware real (USE_REAL_HARDWARE=1), descomentar a
    # secção abaixo e confirmar a porta correcta com: ls /dev/ttyACM*
    #devices:
    #  - /dev/ttyACM0:/dev/ttyACM0
    depends_on:
      redis:
        condition: service_healthy