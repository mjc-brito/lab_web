{% extends "base.html" %}
{% block title %}Recuperar palavra-passe{% endblock %}
{% block content %}
<div style="max-width:400px; margin:40px auto;">
  <div class="card">
    <div class="card-header">Recuperar palavra-passe</div>
    <div class="card-body">
      <p style="font-size:13px; color:#555; margin-bottom:16px;">
        Introduz o e-mail associado à tua conta e enviaremos um link para redefinir a palavra-passe.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Endereço de e-mail</label>
          <input type="email" name="email" autofocus>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;">Enviar link</button>
      </form>
      <p style="margin-top:14px; text-align:center; font-size:13px;">
        <a href="{% url 'login' %}">← Voltar ao login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
