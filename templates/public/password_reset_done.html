{% extends "base.html" %}
{% block title %}E-mail enviado{% endblock %}
{% block content %}
<div style="max-width:400px; margin:40px auto;">
  <div class="card">
    <div class="card-header">E-mail enviado</div>
    <div class="card-body" style="text-align:center; padding:32px;">
      <div style="font-size:40px; margin-bottom:12px;">📧</div>
      <p style="color:#444; line-height:1.7;">
        Se existir uma conta associada ao e-mail introduzido,
        receberás em breve as instruções para redefinir a palavra-passe.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary" style="margin-top:20px; display:inline-block;">
        Voltar ao login
      </a>
    </div>
  </div>
</div>
{% endblock %}
